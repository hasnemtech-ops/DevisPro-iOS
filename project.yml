name: DevisPro
options:
  bundleIdPrefix: com.devispro
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  DevisPro:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: DevisPro
        excludes:
          - "Info.plist"
    info:
      path: DevisPro/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devispro.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
